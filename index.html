<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/allGames.css" />
    <link rel="stylesheet" href="styles/playerStatTable.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
  </head>
  <body>
    <div id="bg"></div>
    <button id="allMatchesBtn">Усі матчі</button>
    <button id="pickedBanedHeroesBtn">Піки</button>

    <div id="matchesStats"></div>
    <table class="statTable" id="playerStatsTable" style="display: none">
      <thead>
        <td>Гравець</td>
        <td>Перемоги</td>
        <td>Поразки</td>
        <td>Услього ігр</td>
        <td>Вінрейт</td>
        <td>Герої</td>
      </thead>
      <tbody></tbody>
    </table>
    <table class="statTable" id="picksStatsTable" style="display: none">
      <thead>
        <td>Іконка</td>
        <td>Ім'я</td>
        <td>
          <span>Кількість банів</span>

          <button class="sort-btn" data-sort="bans">
            <span class="arrow-asc">▲</span><span class="arrow-desc">▼</span>
          </button>
        </td>
        <td>
          <span
            >Перемоги
            <button class="sort-btn" data-sort="wins">
              <span class="arrow-asc">▲</span><span class="arrow-desc">▼</span>
            </button></span
          >
        </td>
        <td>
          <span>Поразки</span>
          <button class="sort-btn" data-sort="lose">
            <span class="arrow-asc">▲</span><span class="arrow-desc">▼</span>
          </button>
        </td>
        <td>
          <span>Кількість піків</span>
          <button class="sort-btn" data-sort="picks">
            <span class="arrow-asc">▲</span><span class="arrow-desc">▼</span>
          </button>
        </td>

        <td>
          <span>Вінрейт</span
          ><button class="sort-btn" data-sort="winrate">
            <span class="arrow-asc">▲</span><span class="arrow-desc">▼</span>
          </button>
        </td>
      </thead>
      <tbody></tbody>
    </table>
    <button></button>
    <script type="module" src="index.js"></script>
  </body>
</html>
